#ddev-generated
services:
  web:
    volumes:
      # $WUNDERIO_GLOBAL_SCRIPT_ROOT is set in wunderio/core/wdr-core.sh, but
      # it's not here. So we need to use the full path to the wunderio
      # directory.
      - ~/.ddev/wunderio:/mnt/ddev-global-cache/wunderio
      - hooks:/mnt/wdr-hooks

# In DDEV, data that must persist across container restarts is stored in
# named volumes. The "hooks" volume persists a marker file so that
# one-time ("run-once") hooks are not executed again on subsequent starts.
volumes:
  hooks:
