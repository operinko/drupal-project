name: Validate

on:
  push:
    branches:
      - main
      - develop
      - production
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate codebase
    runs-on: ubuntu-latest
    container:
      image: wunderio/silta-cicd:circleci-php8.3-node22-composer2-v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP CodeSniffer
        run: |
          if [ -d web/modules/custom ] && [ "$(ls -A web/modules/custom 2>/dev/null)" ]; then
            vendor/bin/phpcs --standard=Drupal,DrupalPractice web/modules/custom
          else
            echo "No custom modules found, skipping PHPCS."
          fi

      - name: PHPStan
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "No PHPStan config found, skipping."
          fi
