name: Build & Push Images

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "k8s/**"
      - "**.md"
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Harbor registry — update REGISTRY to match your Harbor instance hostname.
  # Set REGISTRY_USERNAME and REGISTRY_PASSWORD as GitHub repository secrets.
  # REPO should match the client repository/namespace name, e.g. client-fi-turku.
  REGISTRY: ${{ vars.REGISTRY || 'registry.wdr.io' }}
  REPO: ${{ github.event.repository.name }}

jobs:
  build:
    name: Build & Push — ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: php
            dockerfile: silta/Dockerfile.php
          - name: nginx
            dockerfile: silta/Dockerfile.nginx
          - name: shell
            dockerfile: silta/Dockerfile.shell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          # Normalise branch name: slashes → dashes, truncate to 40 chars
          SAFE=$(echo "$BRANCH" | tr '/' '-' | tr '_' '-' | cut -c1-40)
          # Include UTC timestamp so alphabetical order = chronological order
          # Format: <branch>-<YYYYMMDDTHHmmSS>-<sha>  e.g. main-20260303T213500-6dd52a2
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
          echo "tag=${SAFE}-${TIMESTAMP}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch=${SAFE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.target.name }}:${{ steps.tag.outputs.tag }}
          # Also tag with branch name for easy ImagePolicy pattern matching
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.branch=${{ steps.tag.outputs.branch }}
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,scope=${{ matrix.target.name }},mode=max
