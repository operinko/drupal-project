# Default Helm values for the Drupal application.
#
# Override the defaults of the Wunder Drupal chart.
# @see: https://github.com/wunderio/charts/blob/master/drupal/values.yaml
#
# These values are merged on top of the base defaults from cluster-management.
# Use silta-prod.yml for production-specific overrides.

php:
  drupalCoreVersion: "11"
  cron:
    drupal:
      # Disable cron in feature/PR environments.
      # The ~ is replaced by a random digit (0-9) to spread cron starts.
      schedule: '~ 0 31 2 *'

  # Reference data: sync from the main/staging environment to new environments.
referenceData:
  referenceEnvironment: 'main'

# Enable Mailpit (mail catcher) in non-production environments.
mailpit:
  enabled: true

# MariaDB configuration.
# NOTE: chart uses mariadb 7.x (Bitnami), key is 'master' not 'primary'.
mariadb:
  enabled: true
  master:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 25m
        memory: 366Mi
      limits:
        memory: 488Mi

# File mounts — UpCloud block storage requires ReadWriteOnce.
mounts:
  public-files:
    enabled: true
    storage: 10Gi
    mountPath: /app/web/sites/default/files
    storageClassName: upcloud-block-storage-maxiops
    accessMode: ReadWriteOnce
  private-files:
    enabled: true
    storage: 1Gi
    mountPath: /app/private
    storageClassName: upcloud-block-storage-maxiops
    accessMode: ReadWriteOnce
