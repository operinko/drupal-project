# Example showing how to create SOPS-encrypted secrets for Flux.
#
# SETUP (one time, done by platform team):
#   The platform team provides the Age public key for your cluster.
#   Store it in your environment:
#     export SOPS_AGE_RECIPIENTS=age1...
#
# USAGE:
#   1. Copy this file to silta/secrets.sops.yaml
#   2. Fill in the real values in stringData
#   3. Encrypt in-place:
#        sops --encrypt --in-place silta/secrets.sops.yaml
#   4. Commit the encrypted file. Flux auto-decrypts it when deploying.
#   5. To edit later:
#        sops silta/secrets.sops.yaml
#
# IMPORTANT: Never commit the plaintext version of this file.
#
apiVersion: v1
kind: Secret
metadata:
  name: drupal-project-secrets
  # namespace is injected by Flux at deploy time — do not set it here
type: Opaque
stringData:
  # Example: override Drupal hash salt
  DRUPAL_HASH_SALT: "change-me-to-a-long-random-string"

  # Example: external service credentials
  # SMTP_PASSWORD: "..."
  # SENDGRID_API_KEY: "..."
  # S3_SECRET_KEY: "..."
