---
# Base HelmRelease for the Drupal application.
#
# This file is reconciled by Flux from the cluster-management ResourceSet.
# The following variables are injected at deploy time via postBuild.substitute
# in the cluster-management Kustomization:
#
#   NAMESPACE     — client namespace (e.g. client-fi-turku)
#   BRANCH_PREFIX — branch/environment prefix (e.g. staging, develop, pr-123)
#   PROJECT_NAME  — project name for domain construction (equals NAMESPACE)
#   DOMAIN        — full hostname (e.g. staging.client-fi-turku.dev.wdr.io)
#   REGISTRY      — container registry (registry.wdr.io)
#
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drupal
  namespace: ${NAMESPACE}
spec:
  interval: 5m
  dependsOn: []
  # Don't block on --wait; Certificates can take minutes to issue via ACME
  # and Flux will reconcile drift regardless.
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: drupal
      # Pinned minor version — bump via Renovate or manually.
      version: '>=1.0.0 <2.0.0'
      sourceRef:
        kind: HelmRepository
        name: wunder-charts
        namespace: flux-system
      interval: 12h

  # Base values from cluster-management (sensible defaults for all projects).
  # Provided as a ConfigMap in flux-system by the cluster-management repo.
  valuesFrom:
    - kind: ConfigMap
      name: base-drupal-values
      optional: true # Allows local development without the ConfigMap

  # Project-specific overrides (silta/silta.yml content + environment identity + image tags).
  # These are merged on top of the base ConfigMap values above.
  values:
    # Environment identity — injected by Flux postBuild.substitute
    environmentName: ${BRANCH_PREFIX}
    projectName: ${PROJECT_NAME}

    # Cluster type — prevents GKE-specific resources (BackendConfig) from being rendered.
    cluster:
      type: upcloud

    # ---- silta/silta.yml ----
    php:
      drupalCoreVersion: '11'
      cron:
        drupal:
          schedule: '~ 0 31 2 *'
      # Image tags — managed by Flux Image Automation Controller.
      # These markers are updated in-place by the ImageUpdateAutomation resource.
      # Do NOT edit the tags manually — they will be overwritten by Flux.
      image: ${REGISTRY}/${NAMESPACE}/php:main-0000000 # {"$imagepolicy": "flux-system:${NAMESPACE}-php-${BRANCH_PREFIX}"}

    nginx:
      image: ${REGISTRY}/${NAMESPACE}/nginx:main-0000000 # {"$imagepolicy": "flux-system:${NAMESPACE}-nginx-${BRANCH_PREFIX}"}

    shell:
      mount:
        storageClassName: upcloud-block-storage-maxiops
        accessMode: ReadWriteOnce
        storage: 1Gi
      image: ${REGISTRY}/${NAMESPACE}/shell:main-0000000 # {"$imagepolicy": "flux-system:${NAMESPACE}-shell-${BRANCH_PREFIX}"}

    referenceData:
      enabled: false

    mailpit:
      enabled: true

    mariadb:
      enabled: true
      db:
        # Pinned password prevents credential drift: Bitnami chart regenerates
        # random passwords on every helm upgrade if left empty, which breaks
        # pods after the first install (DB keeps original password, secret changes).
        password: 'drupal-dev-db-pass'
      rootUser:
        password: 'drupal-dev-root-pass'
      master:
        persistence:
          size: 1Gi
        resources:
          requests:
            cpu: 25m
            memory: 366Mi
          limits:
            memory: 488Mi

    mounts:
      public-files:
        enabled: true
        storage: 10Gi
        mountPath: /app/web/sites/default/files
        storageClassName: upcloud-block-storage-maxiops
        accessMode: ReadWriteOnce
      private-files:
        enabled: true
        storage: 1Gi
        mountPath: /app/private
        storageClassName: upcloud-block-storage-maxiops
        accessMode: ReadWriteOnce
    # ---- end silta/silta.yml ----
