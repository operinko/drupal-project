---
# PR image tags — managed by Flux ImageUpdateAutomation.
# This file is separate from kustomization.yaml so the image setter markers
# sit on regular YAML lines (not inside block scalars) where the setter
# strategy can find and update them.
#
# Replace REPO_NAME below with your project's GitHub repository name
# (e.g. client-fi-turku). The ImagePolicy names are generated by the
# cluster-management ResourceSet using the repo name.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drupal
spec:
  values:
    php:
      image: registry.wdr.io/REPO_NAME/php:placeholder # {"$imagepolicy": "flux-system:REPO_NAME-php-pr"}
    nginx:
      image: registry.wdr.io/REPO_NAME/nginx:placeholder # {"$imagepolicy": "flux-system:REPO_NAME-nginx-pr"}
    shell:
      image: registry.wdr.io/REPO_NAME/shell:placeholder # {"$imagepolicy": "flux-system:REPO_NAME-shell-pr"}
